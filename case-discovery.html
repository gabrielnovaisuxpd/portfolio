  const ITER = 200000;

  async function deriveKey(pw, salt) {
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" },
      km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  }

  async function tryDecrypt(pw) {
    const raw = Uint8Array.from(atob(PAYLOAD), c => c.charCodeAt(0));
    const salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
    const key = await deriveKey(pw, salt);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    return new TextDecoder().decode(pt);
  }

  function reveal(html) {
    document.getElementById("lock").remove();
    const c = document.getElementById("content");
    c.innerHTML = html;
    const s = document.createElement("script");
    s.src = "main.js";
    document.body.appendChild(s);
  }

  const saved = sessionStorage.getItem("gn_case_pw");
  if (saved) tryDecrypt(saved).then(reveal).catch(() => sessionStorage.removeItem("gn_case_pw"));

  document.getElementById("lockForm").addEventListener("submit", async e => {
    e.preventDefault();
    const pw = document.getElementById("lockInput").value;
    const err = document.getElementById("lockError");
    err.textContent = "";
    try {
      const html = await tryDecrypt(pw);
      sessionStorage.setItem("gn_case_pw", pw);
      reveal(html);
    } catch (_) {
      err.textContent = "Incorrect password. Try again.";
      const card = document.getElementById("lockCard");
      card.classList.remove("shake");
      void card.offsetWidth;
      card.classList.add("shake");
    }
  });
  </script>
